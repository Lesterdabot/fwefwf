name: Build Hunted Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}
      - name: List files
        run: ls -la
      - name: Grant execute permission
        run: chmod +x gradlew
      - name: Build
        run: ./gradlew build --no-daemon
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: hunted-mod-jar
          path: build/libs/*.jar
          retention-days: 30
